kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
containerdConfigPatches:
- |-
  [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5001"]
    endpoint = ["http://kind-registry:5000"]
name: chatdetective-dev

nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  extraPortMappings:
  # HTTP
  - containerPort: 80
    hostPort: 30080
    protocol: TCP
  # HTTPS
  - containerPort: 443
    hostPort: 30443
    protocol: TCP
  # PostgreSQL
  - containerPort: 5432
    hostPort: 30432
    protocol: TCP
  # RabbitMQ Management UI
  - containerPort: 15672
    hostPort: 30672
    protocol: TCP
  # RabbitMQ AMQP
  - containerPort: 5672
    hostPort: 30673
    protocol: TCP
  extraMounts:
  # Mount for persistent volumes
  - hostPath: /tmp/kind-storage
    containerPath: /mnt/data

networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6444
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"

