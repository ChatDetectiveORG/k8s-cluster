# Default values for kind-microservice-base

replicaCount: 1

image:
  registry: ""
  repository: my-service
  tag: latest
  pullPolicy: IfNotPresent
  pullSecrets: []

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: false
  className: nginx
  annotations: {}
  host: localhost
  path: /
  pathType: Prefix
  tls: []

hpa:
  enabled: false

livenessProbe:
  enabled: false
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: false
  httpGet:
    path: /ready
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

resources: {}
env: []
envFrom: []
podSecurityContext: {}
securityContext: {}
extraVolumes: []
extraVolumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}

persistence:
  enabled: false
  volumeName: data
  mountPath: ""
  existingClaim: ""

# Optional Prometheus metrics endpoint (per-service).
metrics:
  enabled: false
  port: 9090
  path: /metrics
  prometheusScrape: true

