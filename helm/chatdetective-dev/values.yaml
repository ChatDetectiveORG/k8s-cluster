chat-export-service:
  enabled: true
  replicaCount: 1
  image:
    registry: localhost:5001
    repository: chatdetective/chat-export-service
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  runtimeEnv:
