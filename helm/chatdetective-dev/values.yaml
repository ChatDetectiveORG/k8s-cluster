# Default values for local development on kind.
# Personal overrides should go to values-local.yaml (not committed).

runtime:
  # Used by all services via the runtime env ConfigMap.
  numRoutingGoroutines: 4
  masterKey: "VilAUekrAEUQFZZjHvRMSDAyMuskLPZM"

telegram:
  # Shared by services that call Telegram Bot API.
  # For local dev, override in values-local.yaml.
  botToken: ""
  # Used by api-gateway webhook mode (public https URL).
  publicUrl: ""
  webhookPort: "6002"

postgresql:
  # Disable Bitnami subchart for local dev (their tags may disappear / be arch-incompatible).
  enabled: false
  auth:
    username: chatdetective
    password: "chatdetective"
    database: chatdetective

localPostgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  resources: {}

rabbitmq:
  enabled: true
  image:
    # Bitnami removed some debian-tagged images from bitnami/rabbitmq; use legacy repo.
    registry: docker.io
    repository: bitnamilegacy/rabbitmq
    tag: 4.1.3-debian-12-r0
  auth:
    username: chatdetective
    password: "chatdetective"
  persistence:
    enabled: false

redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  auth:
    enabled: false
    # If auth.enabled=true, set a non-empty password and update REDIS_PASSWORD consumers.
    password: ""
  db: 0
  resources: {}

# --- Monitoring (optional) ---
prometheus:
  enabled: true
  alertmanager:
    enabled: false
  kube-state-metrics:
    enabled: false
  prometheus-node-exporter:
    enabled: false
  pushgateway:
    enabled: false
  server:
    # Kind/local defaults: keep it lightweight and stateless.
    persistentVolume:
      enabled: false
    retention: "1d"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

prometheus-adapter:
  enabled: true
  prometheus:
    # This value is templated by the chart.
    url: http://{{ .Release.Name }}-prometheus-server
    port: 80
  rules:
    default: false
    external:
      - seriesQuery: 'chatdetective_commands_h_queue_updates_in_queue{namespace!="",pod!=""}'
        resources:
          overrides:
            namespace:
              resource: namespace
        name:
          matches: "^chatdetective_commands_h_queue_updates_in_queue$"
          as: "chatdetective_queue_updates_backlog"
        metricsQuery: 'sum(max by (namespace, queue) (<<.Series>>{<<.LabelMatchers>>})) by (namespace)'
      - seriesQuery: 'chatdetective_bus_enents_new_queue_updates_in_queue{namespace!="",pod!=""}'
        resources:
          overrides:
            namespace:
              resource: namespace
        name:
          matches: "^chatdetective_bus_enents_new_queue_updates_in_queue$"
          as: "chatdetective_business_events_new_backlog"
        metricsQuery: 'sum(max by (namespace, queue) (<<.Series>>{<<.LabelMatchers>>})) by (namespace)'
      - seriesQuery: 'chatdetective_bus_enents_edited_queue_updates_in_queue{namespace!="",pod!=""}'
        resources:
          overrides:
            namespace:
              resource: namespace
        name:
          matches: "^chatdetective_bus_enents_edited_queue_updates_in_queue$"
          as: "chatdetective_business_events_edited_backlog"
        metricsQuery: 'sum(max by (namespace, queue) (<<.Series>>{<<.LabelMatchers>>})) by (namespace)'

# --- Microservices ---

api-gateway:
  enabled: true
  replicaCount: 1
  image:
    registry: localhost:5001
    repository: chatdetective/api-gateway
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 6002
    targetPort: 6002
  ingress:
    enabled: false
    className: nginx
    host: ""
    pathType: Prefix
    path: /
  runtimeEnv:
    enabled: true
  env: []

command-handler:
  enabled: true
  replicaCount: 1
  image:
    registry: localhost:5001
    repository: chatdetective/command-handler
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  runtimeEnv:
    enabled: true
  metrics:
    enabled: true
    port: 9090
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    external:
      enabled: true
      metricName: chatdetective_queue_updates_backlog
      # Scale up when total backlog grows beyond this threshold.
      targetValue: "200"

message-sender:
  enabled: true
  replicaCount: 1
  image:
    registry: localhost:5001
    repository: chatdetective/message-sender
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  runtimeEnv:
    enabled: true

business-events-new:
  enabled: true
  replicaCount: 1
  image:
    registry: localhost:5001
    repository: chatdetective/business-events-new-handler
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  runtimeEnv:
    enabled: true
  metrics:
    enabled: true
    port: 9090
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    external:
      enabled: true
      metricName: chatdetective_business_events_new_backlog
      targetValue: "200"

business-events-edited:
  enabled: true
  replicaCount: 1
  image:
    registry: localhost:5001
    repository: chatdetective/business-events-edited-handler
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  runtimeEnv:
    enabled: true
  metrics:
    enabled: true
    port: 9090
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    external:
      enabled: true
      metricName: chatdetective_business_events_edited_backlog
      targetValue: "200"
