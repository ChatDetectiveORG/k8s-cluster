# Default values for local development on kind.
# Personal overrides should go to values-local.yaml (not committed).

global:
  security:
    # The chart currently uses bitnamilegacy/rabbitmq because some original Bitnami tags vanished.
    allowInsecureImages: true

runtime:
  # Used by all services via the runtime env ConfigMap.
  numRoutingGoroutines: 4
  # AES master key (16/24/32 bytes). NEVER commit a real value: set it in
  # values-local.yaml (dev) or the on-VPS secrets overlay (prod).
  # See values-local.example.yaml.
  masterKey: ""

runtimeSecret:
  # Local/dev creates a Secret from values for compatibility. Prod must provide these values
  # from an encrypted or CI-generated values file and should keep required=true.
  create: true
  required: false

# Legal consent gate. When any value is empty the bot skips the consent gate
# (acceptable for dev only). Production overlays must set all four.
legal:
  agreementUrl: ""
  privacyUrl: ""
  consentUrl: ""
  docsVersion: ""

telegram:
  # Shared by services that call Telegram Bot API.
  # For local dev, override in values-local.yaml.
  botToken: ""
  # Public username of the bot, e.g. "@MyBot" (used in user-facing texts and referral links).
  botUsername: ""
  # Used by api-gateway webhook mode (public https URL).
  publicUrl: ""
  webhookPort: "6002"

postgresql:
  # Disable Bitnami subchart for local dev (their tags may disappear / be arch-incompatible).
  enabled: false
  auth:
    username: chatdetective
    # Set in values-local.yaml (dev) or the secrets overlay (prod).
    password: ""
    database: chatdetective

localPostgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  resources: {}
  persistence:
    enabled: false
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    mountPath: /var/lib/postgresql/data
    existingClaim: ""

rabbitmq:
  enabled: true
  image:
    # Bitnami removed some debian-tagged images from bitnami/rabbitmq; use legacy repo.
    registry: docker.io
    repository: bitnamilegacy/rabbitmq
    tag: 4.1.3-debian-12-r0
  auth:
    username: chatdetective
    # Set in values-local.yaml (dev) or the secrets overlay (prod).
    password: ""
  persistence:
    enabled: false

redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  auth:
    enabled: false
    # If auth.enabled=true, set a non-empty password and update REDIS_PASSWORD consumers.
    password: ""
  db: 0
  resources: {}

# --- Monitoring (optional) ---
prometheus:
  enabled: true
  alertmanager:
    enabled: false
  kube-state-metrics:
    enabled: false
  prometheus-node-exporter:
    enabled: false
  pushgateway:
    enabled: false
  server:
    # Kind/local defaults: keep it lightweight and stateless.
    persistentVolume:
      enabled: false
    retention: "1d"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

prometheus-adapter:
  enabled: true
  prometheus:
    # This value is templated by the chart.
    url: http://{{ .Release.Name }}-prometheus-server
    port: 80
  rules:
    default: false
    external:
      - seriesQuery: 'chatdetective_commands_h_queue_updates_in_queue{namespace!="",pod!=""}'
        resources:
          overrides:
            namespace:
              resource: namespace
        name:
          matches: "^chatdetective_commands_h_queue_updates_in_queue$"
          as: "chatdetective_queue_updates_backlog"
        metricsQuery: 'sum(max by (namespace, queue) (<<.Series>>{<<.LabelMatchers>>})) by (namespace)'
      - seriesQuery: 'chatdetective_bus_enents_new_queue_updates_in_queue{namespace!="",pod!=""}'
        resources:
          overrides:
            namespace:
              resource: namespace
        name:
          matches: "^chatdetective_bus_enents_new_queue_updates_in_queue$"
          as: "chatdetective_business_events_new_backlog"
        metricsQuery: 'sum(max by (namespace, queue) (<<.Series>>{<<.LabelMatchers>>})) by (namespace)'
      - seriesQuery: 'chatdetective_bus_enents_edited_queue_updates_in_queue{namespace!="",pod!=""}'
        resources:
          overrides:
            namespace:
              resource: namespace
        name:
          matches: "^chatdetective_bus_enents_edited_queue_updates_in_queue$"
          as: "chatdetective_business_events_edited_backlog"
        metricsQuery: 'sum(max by (namespace, queue) (<<.Series>>{<<.LabelMatchers>>})) by (namespace)'

# --- Microservices ---

api-gateway:
  enabled: true
  replicaCount: 1
  image:
    registry: localhost:5001
    repository: chatdetective/api-gateway
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 6002
    targetPort: 6002
  ingress:
    enabled: false
    className: nginx
    host: ""
    pathType: Prefix
    path: /
  runtimeEnv:
    enabled: true
  env: []

command-handler:
  enabled: true
  replicaCount: 1
  image:
    registry: localhost:5001
    repository: chatdetective/command-handler
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  runtimeEnv:
    enabled: true
  metrics:
    enabled: true
    port: 9090
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    external:
      enabled: true
      metricName: chatdetective_queue_updates_backlog
      # Scale up when total backlog grows beyond this threshold.
      targetValue: "200"

message-sender:
  enabled: true
  replicaCount: 1
  image:
    registry: localhost:5001
    repository: chatdetective/message-sender
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  runtimeEnv:
    enabled: true

# Drains the shared Telegram Bot API token bucket in Redis (shared/ratelimit). Must run exactly
# one replica per cluster, or callers will stall waiting for tokens.
event-loop:
  enabled: true
  replicaCount: 1
  image:
    registry: localhost:5001
    repository: chatdetective/event-loop
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  runtimeEnv:
    enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

payment-service:
  enabled: true
  replicaCount: 1
  image:
    registry: localhost:5001
    repository: chatdetective/payment-service
    tag: latest
    pullPolicy: Always
  service:
