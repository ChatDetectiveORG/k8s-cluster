# Minimal production profile for a single-node k3s VPS.
# Keep real secrets out of this file. Provide them via the on-VPS secrets overlay
# (values-k3s-secrets.yaml, see values-k3s-secrets.example.yaml) and pin images via
# values-k3s-images.yaml (see values-k3s-images.example.yaml).

global:
  security:
    # Required by the Bitnami chart when using bitnamilegacy/rabbitmq.
    allowInsecureImages: true

# Fail the render when placeholder domains/legal URLs, :latest images or a non-singleton
# event-loop would reach production. See templates/production-guards.yaml.
productionGuards:
  enabled: true

runtime:
  numRoutingGoroutines: 2
  masterKey: ""

runtimeSecret:
  create: true
  required: true

# Legal documents must be published before public launch. Fill in with the real
# URLs of the reviewed documents (see ProjectDocs/legal) and bump docsVersion on change.
legal:
  agreementUrl: ""
  privacyUrl: ""
  consentUrl: ""
  docsVersion: ""

telegram:
  botToken: ""
  # Public username of the production bot, e.g. "@MyBot".
  botUsername: ""
  # Use an unguessable path, for example: https://bot.example.com/bot<telegram-token>
  publicUrl: "https://bot.example.com/botCHANGE_ME_SECRET_PATH"
  webhookPort: "6002"

postgresql:
  enabled: false
  auth:
    username: chatdetective
    password: ""
    database: chatdetective

localPostgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    mountPath: /var/lib/postgresql/data
    existingClaim: ""

rabbitmq:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/rabbitmq
    tag: 4.1.3-debian-12-r0
  auth:
    username: chatdetective
    password: ""
  persistence:
    enabled: true
    storageClass: local-path
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: 700m
      memory: 768Mi
  extraConfiguration: |-
    vm_memory_high_watermark.relative = 0.4
    disk_free_limit.absolute = 1GB

redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  auth:
    enabled: false
    password: ""
  db: 0
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

prometheus:
  enabled: false

prometheus-adapter:
  enabled: false

api-gateway:
  replicaCount: 1
  terminationGracePeriodSeconds: 60
  image:
    registry: ghcr.io/chatdetectiveorg
    repository: api-gateway
    tag: latest
    pullPolicy: Always
    pullSecrets:
      - name: ghcr-pull-secret
  service:
    type: ClusterIP
    port: 6002
    targetPort: 6002
  livenessProbe:
    enabled: true
    httpGet:
      path: /healthz
      port: 6002
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    enabled: true
    httpGet:
      path: /readyz
      port: 6002
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  extraVolumes:
    - name: tmp
      emptyDir: {}
  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/proxy-body-size: "2m"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    host: bot.example.com
    pathType: Prefix
    path: /
    tls:
      - secretName: chatdetective-api-gateway-tls
        hosts:
          - bot.example.com
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  podSecurityContext:
    fsGroup: 10001
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001

command-handler:
  replicaCount: 1
  terminationGracePeriodSeconds: 60
  extraVolumes:
    - name: tmp
      emptyDir: {}
  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
  image:
    registry: ghcr.io/chatdetectiveorg
    repository: command-handler
    tag: latest
    pullPolicy: Always
    pullSecrets:
      - name: ghcr-pull-secret
  metrics:
    enabled: false
  hpa:
    enabled: false
  resources:
    requests:
      cpu: 75m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  podSecurityContext:
    fsGroup: 10001
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001

message-sender:
  replicaCount: 1
  terminationGracePeriodSeconds: 60
  extraVolumes:
    - name: tmp
      emptyDir: {}
  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
  image:
    registry: ghcr.io/chatdetectiveorg
    repository: message-sender
    tag: latest
    pullPolicy: Always
    pullSecrets:
      - name: ghcr-pull-secret
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  podSecurityContext:
    fsGroup: 10001
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001

# Singleton: drains the shared Telegram rate-limit token bucket. Recreate strategy
# guarantees the old pod is gone before a new one starts during upgrades.
event-loop:
  replicaCount: 1
  strategy:
    type: Recreate
  terminationGracePeriodSeconds: 60
  extraVolumes:
    - name: tmp
      emptyDir: {}
  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
  image:
    registry: ghcr.io/chatdetectiveorg
    repository: event-loop
    tag: latest
    pullPolicy: Always
    pullSecrets:
      - name: ghcr-pull-secret
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 128Mi
  podSecurityContext:
    fsGroup: 10001
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001

