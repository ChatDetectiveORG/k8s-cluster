    pullPolicy: Always
    pullSecrets:
      - name: ghcr-pull-secret
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 750m
      memory: 768Mi
  persistence:
    enabled: true
    storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    size: 20Gi
    mountPath: /var/exports
    existingClaim: ""
  podSecurityContext:
    fsGroup: 10001
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001

