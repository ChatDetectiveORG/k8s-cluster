# Example PRODUCTION secrets overlay for the k3s deployment.
#
# Copy to the VPS as /root/chatdetective/values-k3s-secrets.yaml with mode 600:
#   install -m 600 values-k3s-secrets.example.yaml /root/chatdetective/values-k3s-secrets.yaml
#
# NEVER commit the filled-in file. It is passed as the LAST -f argument:
#   helm upgrade --install chatdetective ./chatdetective-dev \
#     -f values.yaml -f values-k3s-mini.yaml -f values-k3s-images.yaml \
#     -f /root/chatdetective/values-k3s-secrets.yaml

runtime:
  # Exactly 16, 24 or 32 bytes (AES-128/192/256). Generate with:
  #   openssl rand -base64 24 | head -c 32
  # WARNING: losing this key makes all encrypted user data unrecoverable.
  masterKey: "CHANGE_ME"

postgresql:
  auth:
    # Generate with: openssl rand -hex 24
    password: "CHANGE_ME"

rabbitmq:
  auth:
    # Generate with: openssl rand -hex 24
    password: "CHANGE_ME"

telegram:
  # Production bot token from @BotFather.
  botToken: "CHANGE_ME"
  # Public username of the production bot, with or without "@".
  botUsername: "@CHANGE_ME_bot"
  # Public webhook URL. Use an unguessable path segment:
  #   https://<your-domain>/bot<random-string>
  # Generate the random part with: openssl rand -hex 24
  publicUrl: "https://CHANGE_ME.example.com/botCHANGE_ME"
  # Webhook secret echoed back by Telegram in X-Telegram-Bot-Api-Secret-Token.
  # Generate with: openssl rand -hex 32
  webhookSecret: "CHANGE_ME"

# Published legal documents (see ProjectDocs/legal). All four are mandatory for a
# public launch: the bot blocks the main menu until the user accepts them.
legal:
  agreementUrl: "https://CHANGE_ME.example.com/legal/agreement"
  privacyUrl: "https://CHANGE_ME.example.com/legal/privacy"
  consentUrl: "https://CHANGE_ME.example.com/legal/consent"
  # Bump on every published document change; users will be asked to re-consent.
  docsVersion: "2026-07-20"

api-gateway:
  ingress:
    host: "CHANGE_ME.example.com"
    tls:
      - secretName: chatdetective-api-gateway-tls
        hosts:
          - "CHANGE_ME.example.com"
