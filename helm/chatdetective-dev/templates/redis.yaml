{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-redis" .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ printf "%s-redis" .Release.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  selector:
    app.kubernetes.io/name: {{ printf "%s-redis" .Release.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-redis" .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ printf "%s-redis" .Release.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ printf "%s-redis" .Release.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ printf "%s-redis" .Release.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: redis
          image: {{ printf "%s:%s" (.Values.redis.image.repository | default "redis") (.Values.redis.image.tag | default "7-alpine") }}
          imagePullPolicy: {{ .Values.redis.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 6379
              name: redis
          args:
            - "--save"
            - ""
            - "--appendonly"
            - "no"
          resources:
            {{- toYaml (.Values.redis.resources | default dict) | nindent 12 }}
{{- end }}
