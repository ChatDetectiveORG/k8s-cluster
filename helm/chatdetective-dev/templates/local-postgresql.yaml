{{- if .Values.localPostgresql.enabled }}
{{- $persistence := (.Values.localPostgresql.persistence | default dict) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-postgresql" .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ printf "%s-postgresql" .Release.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: {{ printf "%s-postgresql" .Release.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-postgresql" .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ printf "%s-postgresql" .Release.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ printf "%s-postgresql" .Release.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ printf "%s-postgresql" .Release.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: postgresql
          image: {{ printf "%s:%s" (.Values.localPostgresql.image.repository | default "postgres") (.Values.localPostgresql.image.tag | default "16-alpine") }}
          imagePullPolicy: {{ .Values.localPostgresql.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 5432
              name: postgresql
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-runtime-secret" .Release.Name }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database | quote }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml (.Values.localPostgresql.resources | default dict) | nindent 12 }}
          volumeMounts:
            - name: postgres-data
              mountPath: {{ (get $persistence "mountPath" | default "/var/lib/postgresql/data") | quote }}
      volumes:
        - name: postgres-data
          {{- if (get $persistence "enabled" | default false) }}
          persistentVolumeClaim:
            claimName: {{ (get $persistence "existingClaim" | default (printf "%s-postgresql-data" .Release.Name)) | quote }}
          {{- else }}
          emptyDir: {}
          {{- end }}
       
{{- end }}
