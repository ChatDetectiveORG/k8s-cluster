{{- $migrate := (.Values.dbMigrate | default dict) }}
{{- if (get $migrate "enabled" | default true) }}
{{- $files := .Files.Glob "migrations/*.sql" }}
{{- if $files }}
{{- $migrateImage := (get $migrate "image" | default dict) }}
{{- $waitImage := (get $migrate "waitImage" | default dict) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-db-migrations" .Release.Name }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: db-migrate
  annotations:
    helm.sh/hook: post-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
data:
{{- range $path, $content := $files }}
  {{ base $path }}: |
{{ $content | toString | indent 4 }}
{{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-db-migrate-%d" .Release.Name .Release.Revision }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: db-migrate
  annotations:
    helm.sh/hook: post-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ (get $migrate "backoffLimit" | default 3) }}
  activeDeadlineSeconds: {{ (get $migrate "activeDeadlineSeconds" | default 600) }}
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: db-migrate
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-postgres
          image: {{ printf "%s:%s" (get $waitImage "repository" | default "busybox") (get $waitImage "tag" | default "1.36") | quote }}
          command:
            - sh
            - -c
            - |
              until nc -z "${DB_HOST}" "${DB_PORT}"; do
                echo "waiting for postgres at ${DB_HOST}:${DB_PORT}..."
                sleep 2
              done
          envFrom:
            - configMapRef:
                name: {{ printf "%s-runtime-env" .Release.Name }}
      containers:
        - name: migrate
          image: {{ printf "%s:%s" (get $migrateImage "repository" | default "migrate/migrate") (get $migrateImage "tag" | default "v4.18.2") | quote }}
          imagePullPolicy: {{ (get $migrateImage "pullPolicy" | default "IfNotPresent") | quote }}
          command:
            - sh
            - -c
            - |
              migrate -path=/migrations \
                -database "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:${DB_PORT}/${POSTGRES_DB}?sslmode=disable" \
                up
          envFrom:
            - configMapRef:
                name: {{ printf "%s-runtime-env" .Release.Name }}
            - secretRef:
                name: {{ printf "%s-runtime-secret" .Release.Name }}
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
      volumes:
        - name: migrations
          configMap:
            name: {{ printf "%s-db-migrations" .Release.Name }}
{{- end }}
{{- end }}
