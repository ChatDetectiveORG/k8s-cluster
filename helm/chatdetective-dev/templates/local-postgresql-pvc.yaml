{{- if and .Values.localPostgresql.enabled .Values.localPostgresql.persistence.enabled (not .Values.localPostgresql.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ printf "%s-postgresql-data" .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ printf "%s-postgresql" .Release.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes:
    {{- toYaml (.Values.localPostgresql.persistence.accessModes | default (list "ReadWriteOnce")) | nindent 4 }}
  {{- if .Values.localPostgresql.persistence.storageClassName }}
  storageClassName: {{ .Values.localPostgresql.persistence.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.localPostgresql.persistence.size | default "5Gi" | quote }}
{{- end }}
