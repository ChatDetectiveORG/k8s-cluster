{{- $secret := (.Values.runtimeSecret | default dict) }}
{{- if (get $secret "create" | default true) }}
{{- $required := (get $secret "required" | default false) }}
{{- $postgresPassword := .Values.postgresql.auth.password | default "" }}
{{- $rabbitmqPassword := .Values.rabbitmq.auth.password | default "" }}
{{- $redisPassword := .Values.redis.auth.password | default "" }}
{{- $masterKey := .Values.runtime.masterKey | default "" }}
{{- $telegramToken := .Values.telegram.botToken | default "" }}
{{- $webhookSecret := .Values.telegram.webhookSecret | default "" }}
{{- if $required }}
{{- $postgresPassword = required "postgresql.auth.password is required when runtimeSecret.required=true" $postgresPassword }}
{{- $rabbitmqPassword = required "rabbitmq.auth.password is required when runtimeSecret.required=true" $rabbitmqPassword }}
{{- $masterKey = required "runtime.masterKey is required when runtimeSecret.required=true" $masterKey }}
{{- $telegramToken = required "telegram.botToken is required when runtimeSecret.required=true" $telegramToken }}
{{- $webhookSecret = required "telegram.webhookSecret is required when runtimeSecret.required=true" $webhookSecret }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-runtime-secret" .Release.Name }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ $postgresPassword | quote }}
  RABBITMQ_URL: {{ printf "amqp://%s:%s@%s-rabbitmq:5672" .Values.rabbitmq.auth.username $rabbitmqPassword .Release.Name | quote }}
  RABBITMQ_PASSWORD: {{ $rabbitmqPassword | quote }}
  REDIS_PASSWORD: {{ $redisPassword | quote }}
  MASTER_KEY: {{ $masterKey | quote }}
  TELEGRAM_BOT_TOKEN: {{ $telegramToken | quote }}
  TELEGRAM_WEBHOOK_SECRET: {{ $webhookSecret | quote }}
{{- end }}
